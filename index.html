<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Historic Nauvoo</title>

    <base href="/" />

    <meta name="color-scheme" content="light" />
    <!--
      maximum-scale=1.0 and user-scalable=no came with the Ionic starter and
      forbid pinch-zoom. Visitors reading this in the sun, or with any sight
      difficulty, need to be able to zoom in.
    -->
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Theme color for browser chrome -->
    <meta name="theme-color" content="#2C3E50" />

    <!-- App description -->
    <meta name="description" content="Explore Historic Nauvoo - Find locations, view events, and navigate to historic sites." />

    <link rel="manifest" href="/manifest.json" />

    <link rel="shortcut icon" type="image/png" href="/favicon.png" />

    <!-- Google Fonts - Playfair Display & Crimson Pro -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">

    <!-- Add to homescreen for iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Historic Nauvoo" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
